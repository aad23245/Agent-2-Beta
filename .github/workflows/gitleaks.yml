# =============================================================================
# Gitleaks Secret Scanning
# Scans commits for hardcoded secrets, API keys, passwords, and other
# sensitive credentials that should not be checked into source control.
# =============================================================================

name: "Gitleaks Secret Scanning"

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
