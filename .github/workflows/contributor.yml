# =============================================================================
# Contributor Management
# Triggers when a pull request is merged. Welcomes new contributors, updates
# contributor listings, and manages community engagement through the AP Bot's
# contributor_manager module.
# =============================================================================

name: "Contributor Management"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Merged pull request number"
        required: true
        type: number
      pr_author:
        description: "Pull request author username"
        required: true
        type: string
  pull_request_target:
    types: [closed]
permissions:
  pull-requests: write
  issues: write

jobs:
  contributor:
    name: Manage Contributor
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bot dependencies
        run: pip install -r .github/ap_bot/requirements.txt

      - name: Run contributor manager
        run: PYTHONPATH=.github python -m ap_bot.main contributor_manager
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPO_NAME: ${{ github.repository }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login || inputs.pr_author }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
