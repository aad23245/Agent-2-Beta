# =============================================================================
# Dependency Review
# Scans pull requests for newly introduced dependencies and flags any with
# known vulnerabilities at moderate severity or above. Helps prevent
# supply-chain attacks and insecure dependency additions.
# =============================================================================

name: "Dependency Review"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
