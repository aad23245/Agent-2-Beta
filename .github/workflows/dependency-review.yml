# =============================================================================
# Dependency Review
# Scans pull requests for newly introduced dependencies and flags any with
# known vulnerabilities at moderate severity or above. Helps prevent
# supply-chain attacks and insecure dependency additions.
# =============================================================================

name: "Dependency Review"

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        id: dependency-review
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always

      - name: Dependency Review setting check
        if: steps.dependency-review.outcome == 'failure'
        run: |
          echo "::warning::Dependency Review could not run. Enable Dependency graph in repository Settings > Security and analysis, then re-run this workflow."