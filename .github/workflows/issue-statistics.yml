# =============================================================================
# Issue & PR Statistics
# Generates weekly repository health metrics and statistics reports every
# Monday at 9:00 AM UTC. Collects data on open/closed issues, PR throughput,
# response times, and contributor activity via the AP Bot's statistics module.
# =============================================================================

name: "Issue & PR Statistics"

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: read
  pull-requests: read

jobs:
  statistics:
    name: Generate Statistics
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bot dependencies
        run: pip install -r .github/ap_bot/requirements.txt

      - name: Generate statistics report
        run: PYTHONPATH=.github python -m ap_bot.main statistics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPO_NAME: ${{ github.repository }}
