# =============================================================================
# Documentation Checker
# Validates documentation quality, consistency, and completeness on pushes
# and PRs to main. Can create issues or PR comments for documentation gaps
# detected by the AP Bot's documentation_checker module.
# =============================================================================

name: "Documentation Checker"

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: documentation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-docs:
    name: Check Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bot dependencies
        run: pip install -r .github/ap_bot/requirements.txt

      - name: Run documentation checker
        run: PYTHONPATH=.github python -m ap_bot.main documentation_checker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPO_NAME: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
